<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أحمد تك | لشحن عملات برامج الدردشة</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b0f19; color: #ffffff; padding: 20px; }
        header { text-align: center; padding: 30px 0; border-bottom: 1px solid #1e293b; }
        header h1 { color: #38bdf8; font-size: 28px; margin-bottom: 10px; text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }
        header p { color: #94a3b8; font-size: 14px; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px 0; }
        .section-title { color: #f43f5e; margin: 30px 0 15px 0; font-size: 20px; border-right: 4px solid #f43f5e; padding-right: 10px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 15px; text-align: center; transition: 0.3s; display: flex; flex-direction: column; justify-content: space-between; }
        .card:hover { border-color: #38bdf8; transform: translateY(-3px); }
        .card img { width: 50px; height: 50px; margin: 0 auto 10px auto; }
        .card h3 { font-size: 15px; margin-bottom: 5px; color: #e2e8f0; }
        .card .price { color: #10b981; font-weight: bold; font-size: 16px; margin-bottom: 12px; }
        .id-input { padding: 8px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: #fff; text-align: center; margin-bottom: 10px; width: 100%; font-size: 13px; }
        .id-input:focus { border-color: #38bdf8; outline: none; }
        .btn { display: block; background: #25d366; color: #fff; text-decoration: none; padding: 10px; border-radius: 6px; font-weight: bold; font-size: 13px; transition: 0.2s; cursor: pointer; border: none; width: 100%; }
        .btn:hover { background: #128c7e; }
        footer { text-align: center; margin-top: 40px; padding: 20px; border-top: 1px solid #1e293b; color: #64748b; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <h1>أحمد تك - Ahmed Tech</h1>
    <p>أسرع وأضمن منصة لشحن عملات وتطبيقات الدردشة في اليمن</p>
</header>

<div class="container">
    
    <!-- قسم تيك توك -->
    <div class="section-title">شحن تيك توك (TikTok)</div>
    <div class="grid">
        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/3046/3046124.png" alt="coin">
            <h3>100 عملة</h3>
            <div class="price">1.5$</div>
            <input type="text" id="id_tt_100" class="id-input" placeholder="اكتب الـ ID هنا">
            <button class="btn" onclick="sendOrder('تيك توك - 100 عملة', '1.5$', 'id_tt_100')">اشحن الآن</button>
        </div>
        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/3046/3046124.png" alt="coin">
            <h3>500 عملة</h3>
            <div class="price">7.0$</div>
            <input type="text" id="id_tt_500" class="id-input" placeholder="اكتب الـ ID هنا">
            <button class="btn" onclick="sendOrder('تيك توك - 500 عملة', '7.0$', 'id_tt_500')">اشحن الآن</button>
        </div>
    </div>

    <!-- قسم تطبيق لايكي -->
    <div class="section-title">شحن لايكي (Likee)</div>
    <div class="grid">
        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/2489/2489623.png" alt="diamond">
            <h3>50 ماسة</h3>
            <div class="price">1.0$</div>
            <input type="text" id="id_lk_50" class="id-input" placeholder="اكتب الـ ID هنا">
            <button class="btn" onclick="sendOrder('لايكي - 50 ماسة', '1.0$', 'id_lk_50')">اشحن الآن</button>
        </div>
        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/2489/2489623.png" alt="diamond">
            <h3>250 ماسة</h3>
            <div class="price">4.5$</div>
            <input type="text" id="id_lk_250" class="id-input" placeholder="اكتب الـ ID هنا">
            <button class="btn" onclick="sendOrder('لايكي - 250 ماسة', '4.5$', 'id_lk_250')">اشحن الآن</button>
        </div>
    </div>

</div>

<footer>
    <p>&copy; 2026 أحمد تك - Ahmed Tech. جميع الحقوق محفوظة.</p>
</footer>

<script>
    function sendOrder(packageName, price, inputId) {
        var userID = document.getElementById(inputId).value.trim();
        
        if (userID === "") {
            alert("من فضلك اكتب الـ ID الخاص بحسابك أولاً!");
            return;
        }
        
        // تعديل الرقم: ضع رقمك الخاص بالصيغة الدولية وبدون أصفار أو علامة +
        var myPhoneNumber = "‎+967734452305"; 
        
        var message = "مرحباً أحمد تك، أريد طلب شحن:\n\n" +
                      "📦 الباقة: " + packageName + "\n" +
                      "💰 السعر: " + price + "\n" +
                      "🆔 حساب الـ ID: " + userID + "\n\n" +
                      "يرجى تزويدي بطرق الدفع المتاحة للشحن الفوري.";
                      
        var encodedMessage = encodeURIComponent(message);
        var whatsappURL = "https://wa.me/" + myPhoneNumber + "?text=" + encodedMessage;
        
        window.open(whatsappURL, '_blank');
    }
</script>

</body>
</html>
